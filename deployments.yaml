apiVersion: apps/v1
kind: Deployment
metadata:
  name: arcp-web
  namespace: arcp
  labels:
    app: arcp-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: arcp-web
  template:
    metadata:
      labels:
        app: arcp-web
    spec:
      containers:
      - name: arcp-web
        image: azertfcddghjk/arcp-app:latest
        ports:
        - containerPort: 80
        env:
        # Utiliser les settings DEV (pas de SECURE_SSL_REDIRECT -> plus de 301)
        - name: DJANGO_SETTINGS_MODULE
          value: "config.settings.dev"
        - name: REDIS_URL
          value: redis://redis:6379/0
        - name: CELERY_BROKER_URL
          value: redis://redis:6379/1
        - name: CELERY_RESULT_BACKEND
          value: redis://redis:6379/2
        - name: POSTGRES_DB
          value: "arcp"
        - name: POSTGRES_USER
          value: "arcp"
        - name: POSTGRES_PASSWORD
          value: "arcp"
        - name: POSTGRES_HOST
          value: "arcp-db"
        - name: POSTGRES_PORT
          value: "5432"
        - name: DJANGO_ALLOWED_HOSTS
          value: "*"
        - name: CORS_ALLOWED_ORIGINS
          value: "https://arcp.127.0.0.1.nip.io:8443,https://arcp.127.0.0.1.nip.io"
        - name: CSRF_TRUSTED_ORIGINS
          value: "https://arcp.127.0.0.1.nip.io:8443,https://arcp.127.0.0.1.nip.io"
        - name: DJANGO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: arcp-django-secret
              key: django-secret-key
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: arcp
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arcp-celery
  namespace: arcp
  labels:
    app: arcp-celery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arcp-celery
  template:
    metadata:
      labels:
        app: arcp-celery
    spec:
      containers:
      - name: arcp-celery
        image: azertfcddghjk/arcp-app:latest
        args: ["worker"]
        env:
        - name: DJANGO_SETTINGS_MODULE
          value: "config.settings.dev"
        - name: REDIS_URL
          value: redis://redis:6379/0
        - name: CELERY_BROKER_URL
          value: redis://redis:6379/1
        - name: CELERY_RESULT_BACKEND
          value: redis://redis:6379/2
        - name: POSTGRES_DB
          value: "arcp"
        - name: POSTGRES_USER
          value: "arcp"
        - name: POSTGRES_PASSWORD
          value: "arcp"
        - name: POSTGRES_HOST
          value: "arcp-db"
        - name: POSTGRES_PORT
          value: "5432"
        - name: DJANGO_ALLOWED_HOSTS
          value: "*"
        - name: DJANGO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: arcp-django-secret
              key: django-secret-key
